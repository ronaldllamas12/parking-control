services:
  db:
    image: postgres:16-alpine
    container_name: parqueadero_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: parqueadero
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d parqueadero"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: parqueadero_api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: parqueadero_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
